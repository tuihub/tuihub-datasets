name: Run vndb_id_connector

on:
  schedule:
    - cron: "0 0 * * 0"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: dataset-updates
  cancel-in-progress: false

jobs:
  ci:
    runs-on: ubuntu-latest
    env:
      REVIEW_BRANCH: dataset-review/vndb-id-connector
    steps:
      - name: Stop if manual review pull request is open
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          existing_pr="$(gh pr list --state open --head "$REVIEW_BRANCH" --json url --jq '.[0].url // empty')"
          if [ -n "$existing_pr" ]; then
            echo "Manual review pull request is still open: $existing_pr"
            exit 1
          fi

      - uses: actions/checkout@v4

      - name: Build and run docker compose containers
        run: |
          cd src/vndb_id_connector
          docker compose up -d --wait --wait-timeout 1800
      - name: Set up Python 3.11
        uses: actions/setup-python@v3
        with:
          python-version: "3.11"
      - name: Run vndb_id_connector
        run: |
          make init
          cp data/vndb_id_connector/2_automated.json "$RUNNER_TEMP/vndb_id_connector_old.json"
          cd src/vndb_id_connector
          python main.py

      - name: Validate dataset update
        id: validate
        continue-on-error: true
        run: python scripts/validate_dataset_update.py --min-alias-retention 99.5% "$RUNNER_TEMP/vndb_id_connector_old.json" data/vndb_id_connector/2_automated.json

      - name: Create manual review pull request
        if: steps.validate.outcome == 'failure'
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          base: master
          branch: ${{ env.REVIEW_BRANCH }}
          delete-branch: true
          add-paths: data/vndb_id_connector/2_automated.json
          commit-message: "Update vndb_id_connector dataset for manual review"
          title: "[Manual review] vndb_id_connector dataset update"
          body: |
            Automated dataset generation completed, but `scripts/validate_dataset_update.py` failed.

            Please review the generated changes before merging.
            While the `${{ env.REVIEW_BRANCH }}` pull request remains open, this workflow fails before running the update job again.

            Workflow run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

      - name: Fail because manual review is required
        if: steps.validate.outcome == 'failure'
        run: |
          echo "Dataset validation failed; a manual review pull request was opened or updated."
          exit 1

      - name: GitHub Commit & Push
        if: steps.validate.outcome == 'success'
        uses: actions-js/push@v1.5
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: "master"
