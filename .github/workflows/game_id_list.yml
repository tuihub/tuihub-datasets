name: Run game_id_list

on:
  schedule:
    - cron: "0 0 * * 0"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: game-id-list-updates
  cancel-in-progress: false

jobs:
  ci:
    runs-on: ubuntu-latest
    env:
      REVIEW_BRANCH: dataset-review/game-id-list
    steps:
      - name: Stop if manual review pull request is open
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          existing_pr="$(gh pr list --state open --head "$REVIEW_BRANCH" --json url --jq '.[0].url // empty')"
          if [ -n "$existing_pr" ]; then
            echo "Manual review pull request is still open: $existing_pr"
            exit 1
          fi

      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Build and run docker compose containers
        run: |
          cd src/game_id_list
          docker compose up -d --wait --wait-timeout 1800
      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Run game_id_list
        env:
          BANGUMI_DB: bangumi
          BANGUMI_USER: bangumi
          BANGUMI_PASSWORD: bangumi
          BANGUMI_HOST: localhost
          BANGUMI_PORT: 10000
          VNDB_DB: vndb
          VNDB_USER: vndb
          VNDB_PASSWORD: vndb
          VNDB_HOST: localhost
          VNDB_PORT: 10001
          STEAM_WEB_API_KEY: ${{ secrets.STEAM_WEB_API_KEY }}
        run: |
          make init
          cp data/game_id_list/1_automated.json "$RUNNER_TEMP/game_id_list_old.json"
          cd src/game_id_list
          python main.py

      - name: Check for dataset changes
        id: changes
        run: |
          if git diff --quiet -- data/game_id_list/1_automated.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No dataset changes detected."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Dataset changes detected."
          fi

      - name: Validate dataset update
        id: validate
        if: steps.changes.outputs.changed == 'true'
        continue-on-error: true
        run: python scripts/validate_dataset_update.py --min-alias-retention 99.5% "$RUNNER_TEMP/game_id_list_old.json" data/game_id_list/1_automated.json

      - name: Create manual review pull request
        if: steps.changes.outputs.changed == 'true' && steps.validate.outcome == 'failure'
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          base: master
          branch: ${{ env.REVIEW_BRANCH }}
          delete-branch: true
          add-paths: data/game_id_list/1_automated.json
          commit-message: "Update game_id_list dataset for manual review"
          title: "[Manual review] game_id_list dataset update"
          body: |
            Automated dataset generation completed, but `scripts/validate_dataset_update.py` failed.

            Please review the generated changes before merging.
            While the `${{ env.REVIEW_BRANCH }}` pull request remains open, this workflow fails before running the update job again.

            Workflow run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

      - name: Fail because manual review is required
        if: steps.changes.outputs.changed == 'true' && steps.validate.outcome == 'failure'
        run: |
          echo "Dataset validation failed; a manual review pull request was opened or updated."
          exit 1

      - name: GitHub Commit & Push
        if: steps.changes.outputs.changed == 'true' && steps.validate.outcome == 'success'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/game_id_list/1_automated.json
          git commit -m "chore: autopublish $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          for attempt in 1 2 3; do
            git fetch origin master:refs/remotes/origin/master
            git rebase origin/master
            if git push origin HEAD:master; then
              exit 0
            fi
            echo "Push failed; retrying after remote update."
            sleep $((attempt * 5))
          done
          exit 1
